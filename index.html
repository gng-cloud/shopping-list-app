<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Shopping List</title>
  <link href="./src/style.css" rel="stylesheet">
</head>

<body class="text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen">
  <!-- Dynamic blurred shapes for depth -->
  <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
    <!-- Removed for flat design -->
  </div>

  <div id="app" class="max-w-md mx-auto p-4 sm:p-6 pb-24 relative z-10">

    <!-- AUTH SECTION -->
    <section id="auth-section" class="mt-12 flat-card p-8 hidden animate-slide-up">
      <div class="flex justify-center mb-6">
        <div class="w-16 h-16 bg-[#ccfbf1] dark:bg-[#0f766e] rounded-full flex items-center justify-center">
          <svg class="w-8 h-8 text-[#0D9488] dark:text-[#ccfbf1]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
          </svg>
        </div>
      </div>
      <h1 class="text-3xl font-heading font-bold text-center mb-2 text-[#0D9488] dark:text-[#5eead4]">Family Cart</h1>
      <p class="text-center text-[#14B8A6] dark:text-[#99f6e4] mb-8 font-medium">Manage your lists together</p>

      <form id="auth-form" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold mb-1">Email</label>
          <input type="email" id="email" required
            class="block w-full rounded-xl flat-input px-4 py-3 sm:text-sm outline-none" placeholder="you@example.com">
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1">Password</label>
          <input type="password" id="password" required
            class="block w-full rounded-xl flat-input px-4 py-3 sm:text-sm outline-none" placeholder="••••••••">
        </div>
        <div id="auth-error" class="text-red-500 text-sm hidden font-medium text-center bg-red-100 p-2 rounded-lg py-2">
        </div>

        <div class="pt-2">
          <button type="submit" id="login-btn" class="w-full btn-primary px-4 py-3.5">
            Sign In
          </button>
        </div>
        <div>
          <button type="button" id="signup-btn" class="w-full btn-secondary px-4 py-3.5">
            Create Account
          </button>
        </div>
      </form>
    </section>

    <!-- MAIN APP SECTION -->
    <section id="main-section" class="hidden animate-slide-up">

      <!-- Header -->
      <header class="flex justify-between items-center mb-6 pt-4">
        <h1 class="text-3xl font-heading font-extrabold tracking-tight text-[#0D9488] dark:text-[#5eead4]">My List</h1>
        <button id="logout-btn"
          class="p-2 rounded-full hover:bg-[#d1fae5] dark:hover:bg-[#0f766e] text-[#134E4A] dark:text-[#ccfbf1] transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
        </button>
      </header>

      <!-- Family Info & active selector -->
      <div class="glass-panel rounded-2xl p-4 mb-8">
        <div class="flex items-center justify-between">
          <div class="flex-grow pr-4">
            <p class="text-[10px] text-indigo-600 dark:text-indigo-400 font-bold uppercase tracking-wider mb-1">Active
              Family</p>
            <div class="relative">
              <select id="family-select"
                class="appearance-none w-full bg-transparent text-lg font-bold text-gray-900 dark:text-white focus:outline-none cursor-pointer">
                <!-- Options populated dynamically -->
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center text-gray-500">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
              </div>
            </div>
          </div>
          <button id="manage-family-btn"
            class="flex-shrink-0 bg-white/50 dark:bg-black/30 hover:bg-white/80 dark:hover:bg-black/50 p-2.5 rounded-xl border border-white/20 transition-all text-gray-700 dark:text-gray-200 shadow-sm backdrop-blur-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
              </path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Add Item Form -->
      <form id="add-item-form" class="flex items-center mb-8 space-x-2 sm:space-x-3">
        <div class="relative flex-grow">
          <input type="text" id="new-item-input" required
            class="block w-full flat-input rounded-xl sm:text-lg px-4 py-3 sm:py-4 outline-none placeholder-[#14B8A6] dark:placeholder-[#5eead4]/60"
            placeholder="Add an item...">
        </div>
        <button type="button" id="scan-btn" aria-label="Scan Barcode" title="Scan Barcode"
          class="flex-shrink-0 btn-secondary p-3 sm:p-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z">
            </path>
          </svg>
        </button>
        <button type="submit" aria-label="Add Item" class="flex-shrink-0 btn-cta p-3 sm:p-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6">
            </path>
          </svg>
        </button>
      </form>

      <!-- Scanner Container (Hidden by default) -->
      <div id="scanner-container"
        class="hidden mb-8 flat-card overflow-hidden relative aspect-square w-full max-w-sm mx-auto animate-slide-up bg-black dark:bg-black">
        <div id="reader" width="100%"></div>
        <button id="close-scanner-btn"
          class="absolute top-4 right-4 bg-white/20 p-2.5 rounded-full text-white hover:bg-white/40 border border-white/30 transition-colors z-20">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
        <p id="scanner-status"
          class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white text-sm font-bold bg-[#0D9488] px-4 py-2 rounded-xl z-20 shadow-lg">
          Scanning...</p>
      </div>

      <!-- List -->
      <ul id="shopping-list" class="space-y-3 pb-8">
        <!-- Items populated dynamically -->
        <li class="p-6 text-center text-[#14B8A6] font-medium italic animate-pulse">Loading items...</li>
      </ul>

    </section>

    <!-- Manage Family Modal (Hidden by default) -->
    <div id="manage-modal"
      class="fixed inset-0 bg-[#0f766e]/60 hidden z-50 flex items-center justify-center p-4 transition-opacity">
      <div class="flat-card max-w-md w-full p-8 relative animate-slide-up shadow-2xl">
        <button id="close-modal-btn"
          class="absolute top-6 right-6 p-2 rounded-full hover:bg-[#d1fae5] dark:hover:bg-[#0f766e] text-[#134E4A] dark:text-[#ccfbf1] transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>

        <h2 class="text-2xl font-heading font-bold mb-6" id="modal-family-name">Manage Family</h2>

        <div id="owner-actions" class="hidden">
          <h3 class="text-xs font-bold text-[#F97316] uppercase tracking-widest mb-3">Invite Member</h3>
          <form id="invite-form" class="flex space-x-2 mb-6">
            <input type="email" id="invite-email" required
              class="flex-grow rounded-xl flat-input px-4 py-2 text-sm outline-none" placeholder="Email address">
            <button type="submit" class="btn-cta px-5 py-2.5 text-sm">Invite</button>
          </form>
          <p id="invite-msg" class="text-sm mt-1 mb-6 hidden font-medium"></p>
        </div>

        <h3 class="text-xs font-bold text-[#14B8A6] uppercase tracking-widest mb-3">Members</h3>
        <ul id="members-list"
          class="divide-y divide-[#d1fae5] dark:divide-[#0f766e] max-h-48 overflow-y-auto pr-2 no-scrollbar">
          <!-- Members listed here -->
        </ul>
      </div>
    </div>

  </div>

  <!-- Template for list item -->
  <template id="item-template">
    <li class="item-row flat-card p-4 flex items-center justify-between group mb-3 animate-slide-up">
      <div class="flex items-center space-x-4 overflow-hidden">
        <input type="checkbox"
          class="item-checkbox checkbox-pop h-6 w-6 text-[#0D9488] focus:ring-[#0D9488] border-[#99f6e4] dark:border-[#0f766e] bg-[#f0fdfa] dark:bg-[#115e59] rounded-lg cursor-pointer transition-colors accent-[#0D9488]">
        <span
          class="item-name font-semibold text-lg sm:text-xl select-none truncate transition-colors duration-200"></span>
      </div>
      <button
        class="item-delete text-[#14B8A6] hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 p-2 rounded-xl opacity-0 scale-90 group-hover:opacity-100 group-hover:scale-100 transition-all focus:opacity-100">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
          </path>
        </svg>
      </button>
    </li>
  </template>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
